<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Table</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-success">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashboard.html">← Back</a>
  </div>
</nav>

<div class="container timetable-container mt-4">

  <h3 class="text-center mb-4">My Time Table</h3>

  <div class="table-responsive">
    <table class="table table-bordered table-striped text-center">
      <thead class="table-success">
        <tr>
          <th>Day</th>
          <th>9 - 10</th>
          <th>10 - 11</th>
          <th>11 - 12</th>
          <th>12 - 1</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Monday</td>
          <td>Math</td>
          <td>English</td>
          <td>Science</td>
          <td>Break</td>
        </tr>
        <tr>
          <td>Tuesday</td>
          <td>Physics</td>
          <td>Chemistry</td>
          <td>Math</td>
          <td>Break</td>
        </tr>
        <tr>
          <td>Wednesday</td>
          <td>Biology</td>
          <td>Math</td>
          <td>English</td>
          <td>Break</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
